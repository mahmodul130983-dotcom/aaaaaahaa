<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💗 I Coded This Heartbeat For You sumu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="start-overlay" id="startOverlay">
        <div class="glass-card">
            <div class="card-glow"></div>
            <div class="card-icon">💓</div>
            <h2 class="card-title">heartbeat.js</h2>
            <div class="loading-bar-container">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            <p class="status-text" id="statusText">Ready to compile...</p>
            <button class="start-btn" id="startBtn" disabled>
                <span class="btn-text">Run heartbeat.js</span>
                <span class="btn-shine"></span>
            </button>
        </div>
    </div>

    <canvas id="c"></canvas>

    <div class="letter-overlay" id="letterOverlay">
        <div class="letter-card">
            <button class="letter-close" id="letterClose">&times;</button>
            <div class="letter-header">for you</div>
            <div class="letter-body" id="letterBody"></div>
            <div class="letter-sign">— coded with love by shanto</div>
        </div>
    </div>



    <div class="msg" id="msg">
        <p class="m1">I coded this heartbeat for you my sweetheart,sumu❤️</p>
        <p class="m2">for <span>you</span> 💗</p>
    </div>

    <script src="script.js"></script>
</body>

</html>
